<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- 2. CSS in HTML file -->
<style>
    ul {list-style-type: none;}
    body {font-family: Verdana, sans-serif;}

/* Month header */
    .month {
    padding: 70px 25px;
    margin: 0 auto;
    background: #1abc9c;
    text-align: center;
    }

/* Month list */
    .month ul {
    margin: 0;
    padding: 0;
    }

    .month ul li {
    color: black;
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 3px;
    }

/* Previous button inside month header */
    .month .prev {
    float: left;
    padding-top: 10px;
    cursor: pointer;
    }

/* Next button */
    .month .next {
    float: right;
    padding-top: 10px;
    cursor: pointer;
    }

    .month .prev:hover,
    .month .next:hover {
    color: blue;            
    transform: scale(1.2);
    transition: transform 0.1s;
    }


/* Weekdays (Mon-Sun) */
    .weekdays {
    margin: 0;
    padding: 10px 0;
    background-color:#ddd;
    }

    .weekdays li {
    display: inline-block;
    width: 13.6%;
    color: #666;
    text-align: center;
    }

/* Days (1-31) */
    .days {
    padding: 10px 0;
    background: #eee;
    margin: 0;
    }

    .days li {
    list-style-type: none;
    display: inline-block;
    width: 13.6%;
    text-align: center;
    margin-bottom: 2%;
    font-size:16px;
    color: #777;
    }

/* Highlight the "current" day */
    .days li.active {
    padding: 5px;
    background: #1abc9c;
    color: green !important;
    }
     </style>
    <title>Frontpage</title>
</head>
<body>

    <!-- 1. inline CSS skal man helst ik bruge -->
    <h1 style="color: green;">Welcome to my website</h1>

    <h3 class="frontpage-sub-title">I hope you enjoy it</h3>

    <!-- <h2 id="guest-book-counter"></h2>
    <button id="guest-book-button" onclick="incrementCounter()">Add your visit to the counter</button> -->

    <div class="month">
        <ul>
            <li id="previous-button" class="prev" onclick="displayPrevMonth()"><</li>
            <li id="next-button" class="next" onclick="displayNextMonth()">></li>
            <li id="month-display">August<br><span style="font-size:18px" id="year-display">2021</span></li>
            <li >Countdown to next day: </li>
            <li id="countdown-timer" class="time"></li>
        </ul>
    </div>
        <ul class="weekdays">
            <li>Sunday</li>
            <li>Monday</li>
            <li>Tuesday</li>
            <li>Wednesday</li>
            <li>Thursday</li>
            <li>Friday</li>
            <li>Saturday</li>
        </ul>

        <ul class="days" id="days-list">
        </ul>

    <!-- <script src="./frontpage.js"></script> --> 
     <script>
        const guestBookCounter = document.getElementById('guest-book-counter');
        let guestBookCounterValue = 0;

        function incrementCounter() {
            guestBookCounter.textContent = ++guestBookCounterValue;
        }

        const months = ["January", "February", "March", "April", 
                        "May", "June", "July", "August", "September", 
                        "October", "November", "December"];
        
        const dates = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

        let currentMonth = new Date().getMonth();
        const currentDay = new Date().getDay();
        const currentYear = new Date().getFullYear();

        const monthDisplay = document.getElementById('month-display');
        const yearDisplay = document.getElementById('year-display');
        const daysList = document.getElementById('days-list');

        const countDown = document.getElementById('countdown-timer')

        function displayMonth() {
            monthDisplay.firstChild.textContent = months[currentMonth]    
        }

        function displayYear() {
            yearDisplay.textContent = currentYear;
        }

        function displayDays() {
            daysList.innerHTML = '';

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 1; i <= daysInMonth; i++) {
                const li = document.createElement('li')
                li.textContent = i;
                daysList.appendChild(li);
            }            
        }
        
        function displayNextMonth() {
            currentMonth = (currentMonth + 1) % 12;
            monthDisplay.firstChild.textContent = months[currentMonth]
            displayDays();
        }

        function displayPrevMonth() {
            currentMonth = (currentMonth - 1) % 12;
            monthDisplay.firstChild.textContent = months[currentMonth]
            displayDays();
        }

        function countDownTimer() {
            const now = new Date();

            const tomorrow = new Date(now);
            tomorrow.setHours(24, 0, 0, 0);

            let diff = tomorrow - now;
            
            const sec = Math.floor(diff / 1000) % 60;
            const min = Math.floor(diff / 1000 / 60) % 60;
            const hrs = Math.floor(diff / 1000 / 60 / 60);

            countDown.innerHTML = hrs + " hours " + min + " minutes " + sec + " seconds "
        }

        countDownTimer();
        setInterval(countDownTimer, 1000);

        displayMonth();
        displayYear();
        displayDays();

     </script>

</body>

</html>
